services:
  mysql:
    image: mariadb:lts
    networks:
      wpnet:
        ipv4_address: 172.20.0.2
    volumes:
      - ./bin/mysql:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - 3306:3306
  cli:
    privileged: true
    image: wordpress:cli
    networks:
      - wpnet
    extra_hosts:
      - "mysql:172.20.0.2"
    volumes:
      - ./bin:/var/www/html/bin
      - wpcore:/var/www/html/
      - .:/var/www/html/wp-content/plugins/visualizer/
    depends_on:
      - wordpress
    environment:
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=root
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_ROOT_PASSWORD=wordpress
      - WORDPRESS_DEBUG=1
  wordpress:
    privileged: true
    ports:
      - 8080:80
      - 8889:80
    networks:
      - wpnet
    extra_hosts:
      - "mysql:172.20.0.2"
    depends_on:
      - mysql
    image: wordpress:latest
    volumes:
      - ./bin:/var/www/html/bin
      - wpcore:/var/www/html/
      - .:/var/www/html/wp-content/plugins/visualizer/
    environment:
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_ROOT_PASSWORD: wordpress
      WORDPRESS_DEBUG: 1

networks:
  wpnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  wpcore:
